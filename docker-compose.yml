services:
  taboo:
    build:
      context: .
      args:
        GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID:-}
    env_file: .env
    container_name: adversarial-taboo
    restart: unless-stopped
    ports:
      - "4040:4040"
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=production
      - PORT=4040
      - LOG_LEVEL=info
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
